<!DOCTYPE html>
<html>

<head>
    <title>연습문제 9번 완성</title>
</head>

<body>
    <form>
        <table>
            <tr>
                <td><b>시작 그룹</b></td>
            </tr>
            <tr>
                <td>
                    <input type="radio" name="start" id="new-tab" value="newtab">
                    <label for="new-tab">새 탭 페이지 열기</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="radio" name="start" id="continue" value="continue">
                    <label for="continue">중단한 위치에서 계속하기</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="radio" name="start" id="specific" value="specific">
                    <label for="specific">특정 페이지 또는 페이지 모음 열기</label>
                </td>
            </tr>

            <tr>
                <td>&nbsp;</td>
            </tr>

            <tr>
                <td><b>개인정보 및 보안</b></td>
            </tr>
            <tr>
                <td>
                    <input type="checkbox" name="chk_sync" id="sync" value="on">
                    <label for="sync">동기화 및 서비스</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="checkbox" name="chk_login" id="login" value="on">
                    <label for="login">로그인 허용</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="checkbox" name="chk_preload" id="preload" value="on">
                    <label for="preload">페이지 미리 로드</label>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
